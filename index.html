<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVOptima — En mantenimiento</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#080F16;color:#E4F0F6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(13,180,196,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(13,180,196,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:480px}
.logo{font-family:'Fraunces',serif;font-size:28px;font-weight:700;margin-bottom:6px}
.logo b{color:#0DB4C4}
.logo-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#2E6080;margin-bottom:56px}
.icon-wrap{width:72px;height:72px;border-radius:20px;background:rgba(8,145,178,0.08);border:1px solid rgba(13,180,196,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 28px}
.icon-wrap svg{width:32px;height:32px;stroke:#0891B2;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
h1{font-family:'Fraunces',serif;font-size:36px;font-weight:700;letter-spacing:-1px;line-height:1.1;margin-bottom:16px}
h1 em{font-style:italic;color:#0DB4C4}
p{font-size:15px;color:#6BA8C0;line-height:1.7;margin-bottom:40px}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.2);border-radius:20px;padding:8px 18px;font-size:13px;color:#F5A623;margin-bottom:40px}
.dot{width:7px;height:7px;border-radius:50%;background:#F5A623;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
.credit{font-size:12px;color:#163550;margin-top:48px}
.credit b{color:#2E6080}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">CV<b>Optima</b></div>
  <div class="logo-sub">Empleabilidad en Clave Social</div>

  <div class="icon-wrap">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
  </div>

  <h1>Estamos<br>mejorando<br><em>la herramienta</em></h1>

  <p>CVOptima vuelve pronto con mejoras en el diagnóstico.<br>Gracias por tu paciencia.</p>

  <div class="badge">
    <div class="dot"></div>
    Volvemos en breve
  </div>

  <div class="credit">Una herramienta de <b>Alejandra Rolón</b><br>Desarrollo profesional y Empleabilidad</div>
</div>
</body>
</html>
